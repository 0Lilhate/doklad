    #org.hibernate.type: trace
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
  health:
    elasticsearch:
      enabled: false

healthcheck:
  request:
    timeout:
      ms: ${HC_KAFKA_REQUEST_TIMEOUT:5000}
  connections:
    max:
      idle:
        ms: ${HC_KAFKA_CONNECTIONS_MAX_IDLE:10000}
  dbsoft: ${HEALTHCHECK_DBSOFT:false}

service:
  audit-enabled: false
  health:
    pool-check:
      enabled: ${ITA_API_HIKARI_HEALTHCHECK_ENABLED:true}
      retry-interval: ${ITA_API_HIKARI_HEALTHCHECK_INTERVAL:PT5S}
  pod-name: ${HOSTNAME:packagesearchdefault}

kafka:
  audit:
    bootstrap-servers: ${KAFKA_SERVERS_EL:0.0.0.0:9092}
    ssl:
      trust-store-location: ${KAFKA_EL_W_SSL_TRUSTSTORE_LOCATION:null}
      trust-store-password: ${KAFKA_EL_W_SSL_TRUSTSTORE_PASSWORD:changeit}
    security:
      protocol: ${KAFKA_EL_SECURITY_PROTOCOL:PLAINTEXT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: ${KAFKA_EL_ACKS:1}
      properties:
        sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_EL_W_USER:admin}" password="${KAFKA_EL_W_PASSWORD:admin-secret}";
      compression-type: ${KAFKA_EL_COMPRESSION_TYPE:gzip}
      topic: ${ELASTIC_AUDIT_TOPIC:elastic-audit}