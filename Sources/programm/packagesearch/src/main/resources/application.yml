    org.apache.kafka.clients.admin.AdminClientConfig: ${KAFKA_CLIENTS_LOG_LEVEL:WARN}
    org.apache.kafka.clients.producer.ProducerConfig: ${KAFKA_CLIENTS_LOG_LEVEL:WARN}
    org.apache.kafka: ${KAFKA_CLIENTS_NC_LOG_LEVEL:ERROR}
    org.apache.kafka.clients.NetworkClient: ${KAFKA_CLIENTS_NC_LOG_LEVEL:ERROR}
